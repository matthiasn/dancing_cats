name: Gemini Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Review pull request
    if: >-
      ${{
        (
          github.event_name == 'pull_request' &&
          !github.event.pull_request.draft &&
          github.event.pull_request.head.repo.fork == false
        ) || (
          github.event_name != 'pull_request' &&
          startsWith(github.event.comment.body || github.event.review.body, '@gemini-cli /review') &&
          contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association || github.event.review.author_association)
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Resolve pull request
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            let pull;

            if (context.eventName === 'pull_request') {
              pull = context.payload.pull_request;
            } else if (context.eventName === 'issue_comment') {
              if (!context.payload.issue.pull_request) {
                core.setFailed('The @gemini-cli /review command is only supported on pull requests.');
                return;
              }
              const response = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: context.payload.issue.number,
              });
              pull = response.data;
            } else {
              pull = context.payload.pull_request;
            }

            if (pull.head.repo.fork) {
              core.setFailed('Gemini review is disabled for fork pull requests so repository secrets stay protected.');
              return;
            }

            const request = context.payload.comment?.body || context.payload.review?.body || '';
            const additionalContext = request.replace(/^@gemini-cli\s+\/review/i, '').trim();

            core.setOutput('number', String(pull.number));
            core.setOutput('head_sha', pull.head.sha);
            core.setOutput('additional_context', additionalContext);

      - name: Checkout pull request
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_sha }}
          persist-credentials: false

      - name: Prepare prompt context
        run: |
          mkdir -p .gemini
          jq -n \
            --arg repo "${REPOSITORY}" \
            --arg pr "${PULL_REQUEST_NUMBER}" \
            --arg context "${ADDITIONAL_CONTEXT}" \
            '{repository: $repo, pull_request_number: $pr, additional_context: $context}' \
            > .gemini/context.json
        env:
          REPOSITORY: ${{ github.repository }}
          PULL_REQUEST_NUMBER: ${{ steps.pr.outputs.number }}
          ADDITIONAL_CONTEXT: ${{ steps.pr.outputs.additional_context }}

      - name: Run Gemini pull request review
        uses: google-github-actions/run-gemini-cli@v0.1.22
        env:
          GEMINI_CLI_TRUST_WORKSPACE: true
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: ${{ vars.GEMINI_MODEL }}
          github_pr_number: ${{ steps.pr.outputs.number }}
          workflow_name: gemini-review
          extensions: |
            [
              "https://github.com/gemini-cli-extensions/code-review"
            ]
          settings: |
            {
              "model": {
                "maxSessionTurns": 25
              },
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run",
                    "-i",
                    "--rm",
                    "-e",
                    "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server:v0.27.0"
                  ],
                  "includeTools": [
                    "add_comment_to_pending_review",
                    "pull_request_read",
                    "pull_request_review_write"
                  ],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}"
                  }
                }
              },
              "tools": {
                "core": []
              }
            }
          prompt: /pr-code-review
