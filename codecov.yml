# Codecov configuration for dancing_cats.
# See https://docs.codecov.com/docs/codecovyml-reference

coverage:
  status:
    # Non-blocking: report the delta, but never fail a PR on coverage alone.
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
    patch:
      default:
        target: 90%
        threshold: 5%
        informational: true

comment:
  layout: "reach, diff, flags, files"
  require_changes: false

# Exclude things that are not unit-testable application logic.
ignore:
  - "lib/main.dart"          # thin entry-point delegating to the demo's main()
  - "tools/**"               # offline Python/shell tooling
  - "**/*.g.dart"
